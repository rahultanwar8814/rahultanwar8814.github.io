    <meta charset="UTF-8" />
    <title>Word Guessing Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to bottom, #36d1dc, #5b86e5);
      }
      #game-container {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        animation: fadeIn 0.5s ease-in-out;
      }
      textarea,
      input[type="text"] {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        transition: border-color 0.3s ease-in-out;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        transition: background-color 0.3s ease-in-out;
      }
      button:hover {
        background-color: #45a049;
      }
      #word-display {
        font-size: 24px;
        margin-bottom: 20px;
        opacity: 1;
        transition: opacity 0.3s ease-in-out;
      }
      #word-display.hidden {
        opacity: 0;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <h1>Word Guessing Game</h1>
      <textarea
        id="word-list-input"
        placeholder="Enter word list here (one word per line)"
      ></textarea>
      <button id="set-word-list">Set Word List</button>
      <div id="word-display"></div>
      <input type="text" id="user-input" placeholder="Type your guess here" />
    </div>

      const getRandomWord = () => {
        correctWord = wordList[Math.floor(Math.random() * wordList.length)];
        document.getElementById("word-display").textContent = correctWord;
        document.getElementById("word-display").classList.remove("hidden");
        document.getElementById("user-input").value = "";
      };

      const checkInput = () => {
        const userInput = document
          .getElementById("user-input")
          .value.toLowerCase();
        if (userInput === correctWord.toLowerCase()) {
          document.getElementById("word-display").classList.add("hidden");
          clearTimeout(animationTimeout);
          animationTimeout = setTimeout(getRandomWord, 500);
